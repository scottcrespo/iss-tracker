services:

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    ports:
      - "8001:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory"]
    healthcheck:
      # HACK: amazon/dynamodb-local has neither curl nor wget, so we can't do a real HTTP healthcheck.
      # Checking that the JVM is responsive is a best-effort proxy — if Java is running, DynamoDB is up.
      # In production this is irrelevant as we use AWS-managed DynamoDB.
      test: ["CMD-SHELL", "java -version 2>&1 | grep -q 'version' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  pushgateway:
    image: prom/pushgateway:latest
    container_name: pushgateway
    ports:
      - "9091:9091"

  dynamodb-init:
    image: amazon/aws-cli:latest
    container_name: dynamodb-init
    depends_on:
      dynamodb-local:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      aws dynamodb create-table
      --table-name iss-positions
      --attribute-definitions AttributeName=pk,AttributeType=S AttributeName=timestamp,AttributeType=N
      --key-schema AttributeName=pk,KeyType=HASH AttributeName=timestamp,KeyType=RANGE
      --billing-mode PAY_PER_REQUEST
      --endpoint-url http://dynamodb-local:8000

  poller:
    build:
      context: ./poller
      dockerfile: Dockerfile
    container_name: iss-poller
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
      pushgateway:
        condition: service_started
    env_file: ./poller/.env
    environment:
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      PUSHGATEWAY_URL: http://pushgateway:9091

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: iss-api
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
    env_file: ./api/.env
    environment:
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
    ports:
      - "8000:8000"
name: Terraform Bootstrap CI

# Triggers on changes to bootstrap roots only.
# Bootstrap roots require admin credentials and are never planned/applied in CI —
# formatting, validation, and static security analysis are the only checks here.
#
# Bootstrap roots (run manually with admin credentials):
#   - terraform/environments/dev/global/bootstrap/s3-tfstate
#   - terraform/environments/dev/global/bootstrap/iam-terraform-role-human
#   - terraform/environments/dev/global/bootstrap/iam-oidc-provider-github
#   - terraform/environments/dev/global/bootstrap/iam-terraform-role-oidc-plan
#   - terraform/environments/dev/global/bootstrap/iam-terraform-role-oidc-apply
#
# Module tests and non-bootstrap roots are handled by terraform-dev-ci.yml.
# If you add a new bootstrap root, add a validate step below following the
# existing pattern. Do NOT add plan or apply jobs to this file.
on:
  push:
    paths:
      - "terraform/environments/dev/global/bootstrap/**"
  pull_request:
    paths:
      - "terraform/environments/dev/global/bootstrap/**"

jobs:
  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Check formatting
        run: terraform fmt -check -recursive terraform/

      - name: Validate — s3-tfstate
        working-directory: terraform/environments/dev/global/bootstrap/s3-tfstate
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate — iam-terraform-role-human
        working-directory: terraform/environments/dev/global/bootstrap/iam-terraform-role-human
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate — iam-oidc-provider-github
        working-directory: terraform/environments/dev/global/bootstrap/iam-oidc-provider-github
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate — iam-terraform-role-oidc-plan
        working-directory: terraform/environments/dev/global/bootstrap/iam-terraform-role-oidc-plan
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate — iam-terraform-role-oidc-apply
        working-directory: terraform/environments/dev/global/bootstrap/iam-terraform-role-oidc-apply
        run: |
          terraform init -backend=false
          terraform validate

  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkov — Bootstrap Terraform static analysis
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/environments/dev/global/bootstrap
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif

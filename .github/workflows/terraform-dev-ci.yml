name: Terraform Dev CI

# Triggers on changes to non-bootstrap terraform roots.
# Bootstrap roots are excluded — they require admin credentials and are run manually.
# See terraform-bootstrap-ci.yml for bootstrap lint/validate coverage.
#
# Job structure per root:
#   lint-and-validate  — always runs on push and PR
#   plan-{root}        — runs on PR only (needs: lint-and-validate)
#   apply-{root}       — runs on push to main only (needs: lint-and-validate)
#
# When a new non-bootstrap root is added, add a plan and apply job following
# the commented template below.
on:
  push:
    paths:
      - "terraform/**"
      - "!terraform/environments/dev/global/bootstrap/**"
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "terraform/**"
      - "!terraform/environments/dev/global/bootstrap/**"

jobs:
  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Check formatting
        run: terraform fmt -check -recursive terraform/

  # Add plan and apply jobs here as non-bootstrap roots are provisioned.
  # Copy this template for each new root:
  #
  # Manual approval flow:
  #   plan  → uploads plan output as artifact
  #   apply → references a GitHub Environment with required reviewers configured
  #           (Settings → Environments → dev or prod → add reviewer)
  #           GitHub pauses the apply job and notifies the reviewer. The reviewer
  #           downloads the plan artifact, inspects it, then approves or rejects.
  #           Only after approval does the apply job run.

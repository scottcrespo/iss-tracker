name: Terraform Dev CI

# Triggers on changes to non-bootstrap terraform roots.
# Bootstrap roots are excluded — they require admin credentials and are run manually.
# See terraform-bootstrap-ci.yml for bootstrap lint/validate coverage.
#
# Job structure:
#   lint-and-validate  — terraform fmt check
#   checkov            — static security analysis (runs in parallel with lint-and-validate)
#   test-modules       — terraform test for all modules (needs: lint-and-validate)
#
# Plan and apply jobs are not implemented for this public repository.
# See the commented template at the bottom of this file for the full design.
on:
  push:
    branches-ignore:
      - "DEBUG/**"
    paths:
      - "terraform/**"
      - "!terraform/environments/dev/global/bootstrap/**"
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "terraform/**"
      - "!terraform/environments/dev/global/bootstrap/**"

jobs:
  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Check formatting
        run: terraform fmt -check -recursive terraform/

  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    # Runs in parallel with lint-and-validate — no shared dependencies.
    # security-events: write is required to upload SARIF results to the
    # GitHub Security → Code scanning tab.
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkov — Terraform static analysis
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          # Bootstrap roots are excluded — covered by terraform-bootstrap-ci.yml.
          skip_path: terraform/environments/dev/global/bootstrap
          # cli writes findings to the job log; sarif feeds GitHub Code Scanning.
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        # Run even when checkov finds violations so results are always visible.
        if: always()
        with:
          sarif_file: results.sarif

  test-modules:
    name: Module Tests
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Test — iam-permission-boundary
        working-directory: terraform/modules/iam-permission-boundary
        # Uses mock_provider so no AWS credentials are required
        run: |
          terraform init
          terraform test

      - name: Test — iam-terraform-role-human
        working-directory: terraform/modules/iam-terraform-role-human
        # Uses mock_provider so no AWS credentials are required
        run: |
          terraform init
          terraform test

      - name: Test — iam-terraform-role-oidc-plan
        working-directory: terraform/modules/iam-terraform-role-oidc-plan
        # Uses mock_provider so no AWS credentials are required
        run: |
          terraform init
          terraform test

      - name: Test — iam-terraform-role-oidc-apply
        working-directory: terraform/modules/iam-terraform-role-oidc-apply
        # Uses mock_provider so no AWS credentials are required
        run: |
          terraform init
          terraform test

      - name: Test — ecr
        working-directory: terraform/modules/ecr
        # Uses mock_provider so no AWS credentials are required
        run: |
          terraform init
          terraform test

  # plan and apply jobs are not implemented for this public repository.
  #
  # Terraform plan output contains fully resolved resource attributes (account IDs,
  # ARNs, policy documents) sourced from state. On a public repo, GitHub Actions logs
  # are publicly visible and there is no reliable way to suppress all sensitive output —
  # Terraform, provider plugins, and action steps can all emit values that should not
  # be public.
  #
  # The correct production solution is private runners (self-hosted or GitHub's larger
  # runners with restricted log access), or a private repository. The IAM roles,
  # OIDC federation pattern, and manual approval gate are all designed and documented —
  # see docs/decisions/cicd/cicd.md and docs/decisions/terraform/iam-terraform-role.md.

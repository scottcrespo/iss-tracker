name: Poller CI

on:
  push:
    branches-ignore:
      - "DEBUG/**"
    paths:
      - "apps/poller/**"
  pull_request:
    paths:
      - "apps/poller/**"

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/poller
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test with pytest and doc code coverage
        run: |
          pip install pytest-cov
          pytest tests/tests.py --doctest-modules --junitxml=junit/test-results.xml --cov=com --cov-report=xml --cov-report=html

  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f apps/poller/Dockerfile -t iss-poller:${{ github.sha }} apps/poller

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: iss-poller:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true